name: Build VCAM APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          SDK_DIR=${{ runner.temp }}/android-sdk
          echo "ANDROID_SDK_ROOT=${SDK_DIR}" >> $GITHUB_ENV
          mkdir -p ${SDK_DIR}/cmdline-tools
          cd ${SDK_DIR}/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          rm cmdline-tools.zip
          mv cmdline-tools latest
          SDKMANAGER="${SDK_DIR}/cmdline-tools/latest/bin/sdkmanager"
          yes | ${SDKMANAGER} --sdk_root=${SDK_DIR} --licenses > /dev/null 2>&1 || true
          ${SDKMANAGER} --sdk_root=${SDK_DIR} --install \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" > /dev/null

      - name: Generate local.properties
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: |
          keytool -genkey -v -keystore vcam.keystore -alias vcam -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass vcam123456 -keypass vcam123456 \
            -dname "CN=VCAM, OU=VCAM, O=VCAM, L=Unknown, ST=Unknown, C=CN"
          ./gradlew assembleRelease --stacktrace

      - name: Upload APK (Release)
        uses: actions/upload-artifact@v4
        with:
          name: VCAM-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn